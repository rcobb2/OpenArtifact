<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Particle Field</title>
<style>
  body { margin:0; overflow:hidden; background:#05060a; }
  canvas { display:block; }
  .label { position:fixed; bottom:16px; left:16px; color:#5b6478; font:13px -apple-system,Segoe UI,sans-serif; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="label">Move your mouse — particles connect within reach</div>
<script>
const cv = document.getElementById('c'), cx = cv.getContext('2d');
let W, H, pts = [], mouse = {x:-999,y:-999};
function resize(){ W=cv.width=innerWidth; H=cv.height=innerHeight; }
resize(); addEventListener('resize', resize);
addEventListener('mousemove', e=>{ mouse.x=e.clientX; mouse.y=e.clientY; });
for(let i=0;i<90;i++) pts.push({x:Math.random()*innerWidth, y:Math.random()*innerHeight,
  vx:(Math.random()-.5)*.6, vy:(Math.random()-.5)*.6});
function frame(){
  cx.clearRect(0,0,W,H);
  for(const p of pts){
    p.x+=p.vx; p.y+=p.vy;
    if(p.x<0||p.x>W) p.vx*=-1;
    if(p.y<0||p.y>H) p.vy*=-1;
  }
  const all = pts.concat([mouse]);
  for(let i=0;i<all.length;i++) for(let j=i+1;j<all.length;j++){
    const a=all[i], b=all[j], d=Math.hypot(a.x-b.x, a.y-b.y);
    if(d<130){
      cx.strokeStyle=`rgba(124,154,255,${(1-d/130)*.5})`;
      cx.beginPath(); cx.moveTo(a.x,a.y); cx.lineTo(b.x,b.y); cx.stroke();
    }
  }
  cx.fillStyle='#7c9aff';
  for(const p of pts){ cx.beginPath(); cx.arc(p.x,p.y,2,0,7); cx.fill(); }
  requestAnimationFrame(frame);
}
frame();
</script>
</body>
</html>
